<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Women's day Bittu 🐣</title>

<link href="https://fonts.googleapis.com/css2?family=Mali:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
background:linear-gradient(135deg,#fffafa);
overflow:hidden;
font-family:"Mali",cursive;
height:100vh;
position:relative
}

/* center message */

.center-message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:linear-gradient(135deg,rgba(255,255,255,0.95),rgba(255,240,245,0.9));
padding:40px 50px;
border-radius:30px;
font-size:1.6rem;
color:#c2185b;
text-align:center;
box-shadow:0 20px 60px rgba(216,27,96,0.3);
z-index:5;
max-width:90%;
animation:pulse 3s ease-in-out infinite
}

@keyframes pulse{
0%,100%{transform:translate(-50%,-50%) scale(1)}
50%{transform:translate(-50%,-50%) scale(1.05)}
}

.center-message strong{
display:block;
font-size:2rem;
margin-bottom:15px;
background:linear-gradient(45deg,#d81b60,#f06292,#d81b60);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent
}

/* popup */

.overlay{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:rgba(0,0,0,0.5);
z-index:99;
display:none
}

.overlay.active{display:block}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#fff;
border-radius:20px;
box-shadow:0 25px 80px rgba(216,27,96,0.4);
padding:30px;
text-align:center;
z-index:100;
width:90%;
max-width:400px;
display:none
}

.popup p{
font-size:1.1rem;
color:#d81b60;
line-height:1.6
}

/* falling letters */

.falling-letter{
position:absolute;
top:-100px;
width:50px;
animation:fall linear;
cursor:pointer;
z-index:2;
animation-duration:8s
}

@keyframes fall{
0%{transform:translateY(0)}
100%{transform:translateY(100vh);opacity:.3}
}

/* heart explosion */

.heart{
position:absolute;
animation:explode 2s ease-out forwards;
pointer-events:none
}

@keyframes explode{
0%{opacity:1}
100%{transform:translate(var(--dx),var(--dy));opacity:0}
}

/* floating love icons */

.love-letter{
position:fixed;
font-size:22px;
pointer-events:none;
animation:floatLove linear forwards;
opacity:.8;
z-index:0
}

@keyframes floatLove{
0%{transform:translateY(100vh) scale(.8);opacity:0}
20%{opacity:1}
100%{transform:translateY(-10vh) scale(1.2);opacity:0}
}

.center-gif{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:150px;
z-index:10
}

/* NEW: text rain */

.falling-text{
position:absolute;
top:-50px;
font-size:20px;
color:#e91e63;
font-weight:600;
pointer-events:none;
animation:fallText linear forwards;
z-index:1;
}

@keyframes fallText{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(100vh);opacity:.3;}
}

/* Responsive Design */

@media (max-width: 768px) {
    .center-message {
        padding: 20px 25px;
        font-size: 1.2rem;
        max-width: 95%;
    }
    
    .center-message strong {
        font-size: 1.5rem;
        margin-bottom: 10px;
    }
    
    .popup {
        padding: 20px;
        max-width: 90%;
    }
    
    .popup p {
        font-size: 1rem;
    }
    
    .center-gif {
        width: 100px;
        bottom: 10px;
    }
    
    .falling-letter {
        width: 35px;
    }
    
    .falling-text {
        font-size: 16px;
    }
}

@media (max-width: 480px) {
    .center-message {
        padding: 15px 20px;
        font-size: 1rem;
    }
    
    .center-message strong {
        font-size: 1.3rem;
    }
    
    .popup {
        padding: 15px;
        max-width: 95%;
    }
    
    .popup p {
        font-size: 0.9rem;
    }
    
    .center-gif {
        width: 80px;
    }
    
    .falling-letter {
        width: 30px;
    }
    
    .falling-text {
        font-size: 14px;
    }
}

</style>
</head>

<body>

<div class="center-message">
<strong>To The Girl Who Stole My Heart ❤️</strong>
<span id="centerText"></span>
</div>

<img src="./assets/mewmew.gif" class="center-gif">

<div class="popup" id="popup">
<div class="popup-content">
<p id="popupMessage">Message here</p>
</div>
</div>

<div class="overlay" id="overlay"></div>

<audio id="player"
src="https://www.dropbox.com/scl/fi/z5ldgpoatbjocf6nti7bc/a1.mp3?raw=1"
preload="auto"></audio>

<script>

/* autoplay music */

document.addEventListener("click",function playAudio(){
var audio=document.getElementById("player");
audio.play();
document.removeEventListener("click",playAudio);
});

/* typewriter message */

const typeMessage=`Out of everyone in this world,
my heart somehow found you ❤️️`;

let i=0;

function typeWriter(){

if(i<typeMessage.length){

document.getElementById("centerText").innerHTML+=typeMessage.charAt(i);
i++;

setTimeout(typeWriter,60);

}

}

typeWriter();

/* NEW: TEXT RAIN WORDS */

const rainWords=[

"❤️","💖","💕","💘","💞","🥰","😍","😘",

"Love","Bittu","Cutuu","Pagal","Baby","Sweetheart","Babe","Beautiful","Gorgeous","Jannuuu","Forever",

"My Love","My Heart","My Sunshine","My Happiness","My World","My Queen","My Everything",

"I love you","I miss you","You are amazing","You make me happy","You stole my heart",

"My Little One 🐣","Thinking of you","Always yours","Forever yours",

"I LOVE YOU BITTU ❤️","My Heart Belongs To You ❤️"

];

/* NEW: TEXT RAIN FUNCTION */

function createFallingText(){

const text=document.createElement("div");

text.className="falling-text";

text.innerText=rainWords[Math.floor(Math.random()*rainWords.length)];

text.style.left=Math.random()*window.innerWidth+"px";

text.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(text);

setTimeout(()=>{text.remove()},8000);

}

/* start text rain */

setInterval(createFallingText,700);


/* popup messages */

const messages=[

{text:"You are the reason my days feel brighter and my nights feel warmer ❤️"},
{text:"Every moment with you becomes my favorite memory."},
{text:"Your smile is my favorite notification."},
{text:"No matter how busy life gets, you will always be my priority."},
{text:"Wishing you to always stay beautiful, confident, and radiant like flowers."},
{text:"No matter what happens in life, I will always choose you."},
{text:"I feel lucky to have someone as amazing as you."},
{text:"If I had to choose again, I would still choose you."},
{text:"I love every little thing about you, my Little One 🫠🐣"},
{text:"I hope this little page reminds you how special you are to me ❤️"},
{text:"Forever would still not be enough time with you ❤️"},
{text: "Thank you for loving me, supporting me, and standing beside me every day."}
];

let currentMessageIndex=0;

const popup=document.getElementById("popup");
const overlay=document.getElementById("overlay");
const popupMessage=document.getElementById("popupMessage");

const centerText = document.getElementById("centerText");

/* heart explosion */

function createHeartExplosion(x,y){

const hearts=['❤️','💖','💕','💘','💞'];

for(let i=0;i<12;i++){

const heart=document.createElement("div");
heart.classList.add("heart");

heart.textContent=hearts[Math.floor(Math.random()*hearts.length)];

const angle=(Math.PI*2/12)*i;
const distance=Math.random()*80+40;

heart.style.left=x+"px";
heart.style.top=y+"px";

heart.style.setProperty("--dx",Math.cos(angle)*distance+"px");
heart.style.setProperty("--dy",Math.sin(angle)*distance+"px");

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),2000);

}

}

/* falling letters */

const letterImages=[
"./assets/letters.png",
"./assets/q3.png",
"./assets/h1.png",
"./assets/h3.png",
"./assets/t2.png",
"./assets/t5.png",
"./assets/m1.png",
"./assets/m2.png",
"./assets/m3.png",
"./assets/m4.png",
"./assets/m5.png",
"./assets/m6.png"
];

function createFallingLetter(){

const letter=document.createElement("img");

letter.src=letterImages[Math.floor(Math.random()*letterImages.length)];

letter.classList.add("falling-letter");

letter.style.left=Math.random()*(window.innerWidth-50)+"px";

letter.addEventListener("click",(e)=>{

createHeartExplosion(e.clientX,e.clientY);

setTimeout(()=>showPopup(),300);

});

document.body.appendChild(letter);

setTimeout(()=>letter.remove(),8000);

}

setInterval(createFallingLetter,1000);

/* popup show */

function showPopup(){

const message=messages[currentMessageIndex];

popupMessage.textContent=message.text;

popup.style.display="block";
overlay.classList.add("active");

currentMessageIndex=(currentMessageIndex+1)%messages.length;

}

/* FIX: center text updates again */

overlay.addEventListener("click",()=>{

popup.style.display="none";
overlay.classList.remove("active");

centerText.innerHTML = popupMessage.textContent;

});

/* floating love icons */

function createFloatingLove(){

const icons=['💌','❤️','💕','💖','💘'];

const love=document.createElement("div");

love.className="love-letter";

love.innerText=icons[Math.floor(Math.random()*icons.length)];

love.style.left=Math.random()*window.innerWidth+"px";

love.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(love);

setTimeout(()=>love.remove(),9000);

}

setInterval(createFloatingLove,1500);

/* hidden secret popup */

let secretClicks = 0;

document.querySelector(".center-message").addEventListener("click", () => {

secretClicks++;

if(secretClicks >= 5){

popupMessage.innerText = "❤️ I LOVE YOU SWEETAA ❤️";

popup.style.display = "block";
overlay.classList.add("active");

for(let i = 0; i < 25; i++){

setTimeout(()=>{

const x = Math.random() * window.innerWidth;
const y = Math.random() * window.innerHeight;

createHeartExplosion(x, y);

}, i * 80);

}

secretClicks = 0;

}

});

</script>

</body>
</html>
